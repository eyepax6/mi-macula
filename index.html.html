<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Revisión de la Visión Central — Dr. Luis Daniel García Arzate</title>
<meta name="description" content="Herramienta educativa para revisar la visión central mediante la Rejilla de Amsler. Dr. Luis Daniel García Arzate, Oftalmología, Retina y Vítreo. CDMX, México."/>
<meta name="theme-color" content="#053d3c"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Revisión Macular"/>
<style>
/* ============================================================
   Revisión de la Visión Central — esquema único, legible (WCAG AA)
   Paleta: fondo #f0faf1 · tinta #053d3c · coral #cb6b5c (solo roles grandes)
   Grises corregidos a AA: muted 5.0:1 · faint 4.6:1
   ============================================================ */
*{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
:root{
  --bg:#f0faf1; --ink:#053d3c; --accent:#cb6b5c; --accent-2:#d49081;
  --surface:#ffffff; --surface-2:#e3efe6; --glass:rgba(240,250,241,.80);
  --text:#053d3c;
  --muted:#47726f;   /* 5.03:1 sobre fondo — AA texto normal */
  --faint:#4e7874;   /* 4.61:1 sobre fondo — AA texto normal */
  --sep:rgba(5,61,60,.10); --sep-strong:rgba(5,61,60,.16);
  --coral-soft:#f7e3de; --coral-soft-text:#053d3c; /* fondo de chip alterado; ink encima = 9.8:1 */
  --grid-bg:#ffffff; --grid-line:#053d3c;
  --card-shadow:0 1px 1px rgba(5,61,60,.03), 0 4px 14px rgba(5,61,60,.05);
  --r-card:20px; --r-btn:16px; --r-ctl:12px;
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  --spring:cubic-bezier(.32,.72,0,1);
}

/* ---- Modo oscuro (todos los pares verificados ≥6.5:1; coral de marca) ---- */
[data-theme="dark"]{
  --bg:#04302f; --surface:#0b3f3d; --surface-2:#12514d; --glass:rgba(4,48,47,.74);
  --ink:#eaf5ef; --text:#eaf5ef; --muted:#a7c9c2; --faint:#93b9b1;
  --sep:rgba(233,244,238,.12); --sep-strong:rgba(233,244,238,.22);
  --coral-soft:#5c2c24; --coral-soft-text:#f6ddd6;
  --card-shadow:0 1px 1px rgba(0,0,0,.24), 0 6px 20px rgba(0,0,0,.32);
}
/* En oscuro, los elementos coral llevan texto oscuro no aplica: el CTA/orbe
   usan blanco sobre coral (3.62:1, válido como texto grande). */



html{ -webkit-text-size-adjust:100%; }
body{
  font-family:var(--font); background:var(--bg); color:var(--text);
  line-height:1.47; -webkit-font-smoothing:antialiased;
  min-height:100vh; min-height:100dvh;
  transition:background .4s var(--spring), color .3s var(--spring);
}
button{ font-family:inherit; cursor:pointer; color:inherit; background:none; border:none; font-size:inherit; }
a{ color:inherit; text-decoration:none; }
:focus-visible{ outline:3px solid var(--accent); outline-offset:2px; border-radius:10px; }

/* ---------- estructura ---------- */
.app{ max-width:520px; margin:0 auto; min-height:100vh; min-height:100dvh;
  display:flex; flex-direction:column;
  padding:0 max(20px, env(safe-area-inset-left)) 0 max(20px, env(safe-area-inset-right)); }

.topbar{
  display:flex; align-items:center; justify-content:space-between;
  padding:calc(12px + env(safe-area-inset-top)) 2px 10px;
  position:sticky; top:0; z-index:10;
  background:var(--glass);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  backdrop-filter:saturate(180%) blur(20px);
  margin:0 -20px; padding-left:22px; padding-right:22px;
  border-bottom:0.5px solid var(--sep);
}
.logo{ display:inline-flex; }
.logo img{ width:24px; height:auto; display:block; }
.logo .logo-l{ display:none; }
[data-theme="dark"] .logo .logo-d{ display:none; }
[data-theme="dark"] .logo .logo-l{ display:block; }
.icon-btn{
  width:34px; height:34px; border-radius:50%;
  font-size:24px; line-height:1; padding-bottom:3px;
  display:flex; align-items:center; justify-content:center;
  color:var(--ink); background:var(--surface-2);
  transition:transform .15s var(--spring), opacity .15s;
}
.icon-btn:active{ transform:scale(.9); opacity:.7; }

.stage{ flex:1; display:flex; flex-direction:column; padding:14px 0 8px; }
.stage.enter{ animation:pushIn .38s var(--spring) both; }
.stage.leave{ opacity:0; transform:translateX(-6px); transition:opacity .16s ease, transform .16s ease; }
@keyframes pushIn{ from{ opacity:0; transform:translateX(22px); } to{ opacity:1; transform:none; } }

.scr{ flex:1; display:flex; flex-direction:column; }
.scr-center{ justify-content:center; align-items:center; text-align:center;
  padding:calc(28px + env(safe-area-inset-top)) 0 36px; }
.scr-foot{ margin-top:auto; padding:26px 0 14px; display:flex; justify-content:center; }
.scr-foot.two{ justify-content:space-between; align-items:center; gap:12px; }

/* ---------- tipografía ---------- */
.display{ font-size:clamp(36px,9vw,48px); font-weight:800; letter-spacing:-.034em; line-height:1.03; margin-top:22px; }
.title{ font-size:clamp(27px,6vw,34px); font-weight:750; letter-spacing:-.026em; line-height:1.1; padding-top:6px; }
.title.small{ font-size:clamp(21px,4.8vw,25px); letter-spacing:-.02em; }
.lede{ font-size:17px; color:var(--muted); max-width:30ch; margin:10px auto 0; letter-spacing:-.005em; }
.fineprint{ font-size:13px; color:var(--muted); max-width:38ch; margin:18px auto 0; line-height:1.5; }
.contact-card .city{ font-size:12.5px; font-weight:600; color:var(--faint); margin-top:2px;
  letter-spacing:.03em; }

/* ---------- marca de portada ---------- */
/* Portada: logo flotante sin caja — el doble asset garantiza contraste en cada tema */
.hero-mark{ display:flex; align-items:center; justify-content:center; margin-bottom:6px; }
.hero-mark .logo img{ width:92px; height:auto; }

/* ---------- botones ---------- */
.stack{ display:flex; flex-direction:column; align-items:center; gap:10px; margin-top:34px; width:100%; }
.big{
  display:inline-flex; align-items:center; justify-content:center;
  min-height:54px; padding:16px 28px; border-radius:var(--r-btn);
  font-size:17px; font-weight:600; letter-spacing:-.008em;
  width:100%; max-width:400px;
  transition:transform .16s var(--spring), opacity .16s, background .2s;
}
.big:active{ transform:scale(.97); opacity:.85; }
.big-primary{ background:var(--ink); color:var(--bg); }
/* CTA de alerta: coral con texto grande (19px/700) → cumple 3:1 para texto grande */
.big-accent{ background:var(--accent); color:#fff; font-size:19px; font-weight:700; }
.big-ghost{ background:var(--surface-2); color:var(--ink); }
.big.is-disabled{ opacity:.35; pointer-events:none; }
/* Enlaces en tinta (11:1) — el coral pequeño no alcanza AA */
.link-btn{ font-size:16px; font-weight:600; color:var(--ink); padding:10px; letter-spacing:-.005em; }
.link-btn.danger{ display:block; margin:6px auto 0; color:var(--muted); transition:color .2s, background .2s; }
.link-btn.danger.confirming{ color:#fff; background:var(--accent); border-radius:999px;
  padding:10px 18px; font-weight:700; }

/* ---------- listas agrupadas ---------- */
.prep-list{ list-style:none; margin-top:26px; background:var(--surface);
  border-radius:var(--r-card); box-shadow:var(--card-shadow); overflow:hidden; }
.prep-list li{ display:flex; align-items:center; gap:15px; font-size:17px; font-weight:450;
  letter-spacing:-.008em; padding:15px 18px; animation:rowIn .4s var(--spring) both; }
.prep-list li + li{ border-top:0.5px solid var(--sep); }
.prep-ico{ flex:0 0 40px; height:40px; border-radius:10px; background:var(--surface-2);
  display:flex; align-items:center; justify-content:center; color:var(--ink); }
.prep-ico svg{ display:block; }
@keyframes rowIn{ from{ opacity:0; transform:translateY(8px); } to{ opacity:1; transform:none; } }

/* ---------- progreso ---------- */
.progress{ display:flex; flex-direction:column; gap:7px; align-items:center; margin-bottom:4px; }
.progress-track{ display:flex; gap:5px; width:100%; max-width:250px; }
.seg{ flex:1; height:4px; border-radius:2px; background:var(--sep-strong); transition:background .35s var(--spring); }
.seg.on{ background:var(--accent); }
.progress-label{ font-size:12px; font-weight:600; color:var(--faint); letter-spacing:.06em; text-transform:uppercase; }

/* ---------- rejilla ---------- */
.scr-grid{ align-items:center; }
.grid-head{ text-align:center; width:100%; display:flex; flex-direction:column; align-items:center; gap:9px; }
.eye-pill{ font-size:13px; font-weight:650; letter-spacing:.02em; color:var(--bg); background:var(--ink);
  padding:7px 16px; border-radius:999px; }
.grid-instr{ font-size:15px; color:var(--muted); letter-spacing:-.005em; }
.grid-stage{ flex:1; display:flex; align-items:center; justify-content:center; width:100%; padding:16px 0; }
.amsler{ width:100%; max-width:min(76vh,430px); height:auto; display:block;
  border-radius:var(--r-card); box-shadow:var(--card-shadow); }
.fixdot{ transform-box:fill-box; transform-origin:center; animation:breathe 3.4s ease-in-out infinite; }
@keyframes breathe{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.26); } }

/* ---------- síntomas ---------- */
.sym-list{ margin-top:20px; background:var(--surface); border-radius:var(--r-card);
  box-shadow:var(--card-shadow); overflow:hidden; }
.sym{ display:flex; align-items:center; gap:14px; text-align:left; width:100%;
  min-height:62px; padding:13px 16px; font-size:17px; font-weight:450; letter-spacing:-.008em;
  color:var(--text); transition:background .18s; animation:rowIn .36s var(--spring) both; }
.sym + .sym{ border-top:0.5px solid var(--sep); }
.sym:active{ background:var(--surface-2); }
.sym-ico{ flex:0 0 38px; height:38px; border-radius:10px; background:var(--surface-2);
  display:flex; align-items:center; justify-content:center; font-size:17px; font-weight:700;
  transition:background .2s var(--spring), color .2s var(--spring); }
.sym-txt{ flex:1; }
.sym-check{ flex:0 0 24px; height:24px; border-radius:50%; display:flex; align-items:center;
  justify-content:center; font-size:13px; font-weight:700; color:#fff;
  box-shadow:inset 0 0 0 1.5px var(--sep-strong); transition:all .2s var(--spring); }
.sym.on .sym-ico{ background:var(--accent); color:#fff; }
.sym.on .sym-check{ background:var(--accent); box-shadow:none; transform:scale(1.06); }
.sym.sym-normal.on .sym-ico{ background:var(--ink); color:var(--bg); }
.sym.sym-normal.on .sym-check{ background:var(--ink); }

/* ---------- resultado ---------- */
.result-orb{ width:96px; height:96px; border-radius:50%; display:flex; align-items:center;
  justify-content:center; font-size:42px; font-weight:600; margin-bottom:10px;
  animation:orbIn .55s var(--spring) both; }
.result-orb.ok{ background:var(--ink); color:var(--bg); }
.result-orb.alert{ background:var(--accent); color:#fff; }
@keyframes orbIn{ from{ opacity:0; transform:scale(.6); } to{ opacity:1; transform:none; } }
.findings{ display:flex; flex-direction:column; margin:16px 0 2px; width:100%; max-width:360px;
  background:var(--surface); border-radius:var(--r-card); box-shadow:var(--card-shadow); overflow:hidden; }
.finding{ font-size:15px; padding:13px 16px; text-align:left; letter-spacing:-.005em; }
.finding + .finding{ border-top:0.5px solid var(--sep); }
.finding b{ color:var(--ink); margin-right:8px; font-weight:700; }
.result-links{ display:flex; gap:20px; margin-top:14px; }

/* ---------- educación ---------- */
.edu-caveat{ font-size:14.5px; color:var(--muted); line-height:1.5; letter-spacing:-.005em;
  background:var(--surface); border-radius:var(--r-card); box-shadow:var(--card-shadow); padding:16px 18px; margin-top:16px; }
.edu-caveat b{ color:var(--text); }
.edu-grid{ margin-top:16px; display:flex; flex-direction:column; gap:16px; }
.edu-card{ background:var(--surface); border-radius:var(--r-card); box-shadow:var(--card-shadow); overflow:hidden; }
.edu-vis{ display:flex; justify-content:center; padding:20px 16px 8px; }
.edu-vis svg{ border-radius:14px; }
.edu-body{ padding:8px 20px 20px; }
.edu-body b{ font-size:17px; letter-spacing:-.015em; }
.edu-body p{ font-size:14.5px; color:var(--muted); margin-top:3px; letter-spacing:-.005em; }
.slider-row{ display:flex; align-items:center; gap:12px; margin-top:16px; font-size:12px;
  font-weight:600; color:var(--faint); text-transform:uppercase; letter-spacing:.05em; }
.slider-row input[type="range"]{ flex:1; -webkit-appearance:none; appearance:none; height:4px;
  border-radius:2px; background:var(--sep-strong); outline:none; }
.slider-row input[type="range"]::-webkit-slider-thumb{ -webkit-appearance:none; appearance:none;
  width:26px; height:26px; border-radius:50%; background:#fff; cursor:pointer;
  box-shadow:0 0.5px 1px rgba(0,0,0,.12), 0 3px 8px rgba(0,0,0,.16), inset 0 0 0 0.5px rgba(0,0,0,.04); }
.slider-row input[type="range"]::-moz-range-thumb{ width:26px; height:26px; border:none; border-radius:50%;
  background:#fff; cursor:pointer; box-shadow:0 3px 8px rgba(0,0,0,.16); }

/* ---------- contacto ---------- */
.contact-doctor{ font-size:14px; color:var(--muted); margin-top:8px; letter-spacing:-.005em; }
.contact-grid{ margin-top:14px; display:flex; flex-direction:column; gap:14px; }
.contact-card{ background:var(--surface); border-radius:var(--r-card); box-shadow:var(--card-shadow); padding:20px 20px; }
.contact-card b{ font-size:18px; font-weight:700; letter-spacing:-.02em; }
.contact-tel{ font-size:16px; font-weight:500; color:var(--muted); margin-top:4px; letter-spacing:-.005em; }
.contact-actions{ display:flex; gap:8px; margin-top:16px; }
.mini{ flex:1; text-align:center; min-height:44px; display:flex; align-items:center; justify-content:center;
  border-radius:var(--r-ctl); font-size:15px; font-weight:600; letter-spacing:-.008em;
  background:var(--surface-2); color:var(--ink); transition:transform .15s var(--spring), opacity .15s; }
.mini:active{ transform:scale(.95); opacity:.8; }
/* WhatsApp: tinta (blanco/ink = 11:1) — coral pequeño con blanco no alcanza AA */
.mini.accent{ background:var(--ink); color:var(--bg); }

/* ---------- historial ---------- */
.timeline{ margin-top:18px; background:var(--surface); border-radius:var(--r-card); box-shadow:var(--card-shadow); overflow:hidden; }
.tl-item{ display:flex; align-items:flex-start; gap:13px; padding:15px 16px; }
.tl-item + .tl-item{ border-top:0.5px solid var(--sep); }
.tl-dot{ flex:0 0 10px; width:10px; height:10px; border-radius:50%; background:var(--accent); margin-top:6px; }
.tl-content{ flex:1; }
.tl-when{ display:flex; align-items:baseline; gap:9px; }
.tl-when b{ font-size:15.5px; letter-spacing:-.01em; }
.tl-when span{ font-size:13px; color:var(--faint); }
.tl-chips{ display:flex; flex-wrap:wrap; gap:5px; margin-top:7px; }
.tl-chip{ font-size:12px; font-weight:600; padding:4px 10px; border-radius:999px; letter-spacing:-.005em; }
.tl-chip.ok{ background:var(--surface-2); color:var(--ink); }
/* Chip alterado: fondo coral suave + tinta (9.8:1) en vez de blanco/coral (3.6:1) */
.tl-chip.alt{ background:var(--coral-soft); color:var(--coral-soft-text); box-shadow:inset 0 0 0 1px rgba(203,107,92,.5); }
.tl-del{ font-size:13px; color:var(--muted); padding:4px; }
.tl-del:active{ color:var(--accent); }
.storage-note{ font-size:12.5px; color:var(--faint); margin-top:16px; line-height:1.5; letter-spacing:-.003em; }

/* ---------- pie ---------- */
.app-foot{ text-align:center; padding:22px 0 calc(26px + env(safe-area-inset-bottom)); margin-top:24px;
  border-top:0.5px solid var(--sep); display:flex; flex-direction:column; gap:7px; }
.app-foot span{ font-size:12.5px; color:var(--muted); letter-spacing:-.003em; }
.app-foot .disc{ font-size:11.5px; color:var(--muted); max-width:42ch; margin:0 auto; line-height:1.5; }

/* =====================================================================
   Adaptación automática por plataforma
   — Pantallas grandes (PC/Mac, tablets horizontales): columna más ancha,
     rejillas educativas y de contacto a dos columnas, Amsler mayor.
   — Dispositivos con puntero fino (ratón/trackpad): estados hover.
     En táctil (Android/iOS) los hover no se emiten, evitando estados
     "pegados" tras el toque.
   ===================================================================== */
@media (min-width:720px){
  .app{ max-width:680px; }
  .stage{ padding-top:22px; }
  .edu-grid{ display:grid; grid-template-columns:1fr 1fr; gap:18px; }
  .contact-grid{ display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .amsler{ max-width:min(72vh,480px); }
  .display{ font-size:52px; }
  .prep-list li{ padding:17px 22px; }
}
@media (min-width:1100px){
  .app{ max-width:760px; }
}
@media (hover:hover) and (pointer:fine){
  .big{ cursor:pointer; }
  .big-primary:hover{ filter:brightness(1.18); }
  .big-accent:hover{ filter:brightness(1.07); }
  .big-ghost:hover{ background:var(--sep); }
  .sym:hover{ background:var(--surface-2); }
  .mini:hover{ filter:brightness(1.05); background:var(--sep); }
  .mini.accent:hover{ filter:brightness(1.18); background:var(--ink); }
  .icon-btn:hover{ transform:scale(1.06); }
  .link-btn:hover{ text-decoration:underline; }
  .tl-del:hover{ color:var(--accent); }
  .slider-row input[type="range"]::-webkit-slider-thumb:hover{ transform:scale(1.12); }
}

@media (prefers-reduced-motion: reduce){ *{ animation:none !important; transition:none !important; } }

/* ---------- impresión / exportar PDF ---------- */
@media print{
  body{ background:#fff; }
  .topbar,.app-foot,.no-print,.scr-foot,.icon-btn{ display:none !important; }
  .app{ max-width:100%; padding:0 12mm; }
  .title{ font-size:22px; }
  .timeline{ box-shadow:none; border:0.5px solid #ccc; }
  .tl-item{ break-inside:avoid; }
}

</style>
</head>
